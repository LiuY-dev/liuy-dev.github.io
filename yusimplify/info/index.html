        <template id="input_guide_content">
            <div style="height: auto; width: auto;">
                <h1>Input Guide</h1>
                <h2 style="font-family: Poppins;">What you can input</h2>
                <span class="info-content-paras">The input needs to be in AsciiMath format but a lot of the symbols don't work. Full AsciiMath documentation can be found <a href="https://asciimath.org/" target="_blank">here</a>. Only the following AsciiMath symbols work:</span>
               
                <p></p>
                <table>
                    <tr>
                        <th>AsciiMath</th>
                        <th>Example</th>
                    </tr>

                    <tr>
                        <td>+</td>
                        <td>`2+2`</td>
                    </tr>
                    <tr>
                        <td>-</td>
                        <td>`4-1`</td>
                    </tr>
                    <tr>
                        <td>*</td>
                        <td>`4*8`</td>
                    </tr>
                    <tr>
                        <td>/</td>
                        <td>`2/3`</td>
                    </tr>
                    <tr>
                        <td>^</td>
                        <td>`4^3`</td>
                    </tr>
                    <tr>
                        <td>sqrt()</td>
                        <td>`sqrt(64)`</td>
                    </tr>
                    <tr>
                        <td>()</td>
                        <td>`(6 + 3)*2`</td>
                    </tr>
                    <tr>
                        <td>!</td>
                        <td>`10!`</td>
                    </tr>

                </table>

                <p></p>
                <span class="info-content-paras">If you want to take the nth root of `x`, you must do x^(1/n) which would be `x^(1/n)`, which would equal `root(n)(x)`. The maths solver does not handle root(a)(b) format.</span>

                <p></p>

            </div>
        </template>

        <template id="about_content">
            <div style="height: auto; width: auto;">
                <h1>About</h1>

                <h2 style="font-family: Poppins;">What YuSimplify is</h2>
                <span class="info-content-paras">YuSimplify is a very simple piece of software made by me, <a href="https://github.com/LiuY-dev" target="_blank">Yuan Liu</a>, a solo developer from England. YuSimplify simplifies mathematical expressions, it does not do a lot of complicated stuff like logarithms, trig, etc.</span>

                <h2 style="font-family: Poppins;">How it Works</h2>
                <span class="info-content-paras">When the input is entered, the program first checks if it is just whitespace or empty. Then, it uses the input to call <a href="https://github.com/aunyks/newton-api" target="_blank">Newton API</a>, a 3rd party, micro, Maths API. For example, if the user enters '(x-3)(2x+7)',</span>
                
                <p></p>
                <span class="info-content-paras">The text gets encoded to url format, so (x-3)(2x+7) becomes: %28x-3%29%282x%2B7%29</span>

                <p></p>
                <span class="info-content-paras">Then the api gets called with the encoded maths. In our example, a GET request is sent to: <p></p>'https://newton.vercel.app/api/v2/simplify/%28x-3%29%282x%2B7%29'</span>

                <p></p>
                <span class="info-content-paras">When the program recieves a response, some nodes in the DOM are removed and new stuff are added such as the return button, view raw button, and the maths text element. In our example, "2 x^2 + x - 21" is returned.</span>

                <p></p>
                <span class="info-content-paras">Then the asciimath that the API returned is converted to Tex which is the fancy maths formatting. This is done by a javascript plugin called Mathjax which handles the conversion, formatting and display. MathJax is called to do it's job and...</span>

                <p></p>
                <span class="info-content-paras">Voilà! That's how (x-3)(2x+7) gets converted to: </span>
                <p></p><span style="font-size: 1.5rem;">`2x^2 + x - 21`</span>

                <p></p>
                <h2 style="font-family: Poppins;">Why I made it</h2>

                <span class="info-content-paras">I wanted to make this micro project for fun and experience. I have had little experience with web developement before this now I feel more experienced. I now know how to make a simple fontend, which can: call API's, have multiple pages, button inputs, and a simple & clean UI that I'm proud of.</span>

                <p></p>
                <span class="info-content-paras">Plus, it's one of the multitudinous projects I can put in my CV  ;)</span>

                <p></p>
                <span class="info-content-paras"></span>

            </div>
